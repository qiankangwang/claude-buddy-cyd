[platformio]
default_envs = cyd

; ESP32-2432S028R "Cheap Yellow Display" (CYD2USB variant -> ST7789)
; Official espressif32 6.x => Arduino core 2.x. Do NOT move to core 3.x / pioarduino.
[env:cyd]
platform = espressif32@^6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = COM5
monitor_port = COM5
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
; BLE path (src/ble/) is shelved in favour of the self-hosted WiFi+hooks design.
build_src_filter = +<*> -<ble/>
; NOTE: on a slow/blocked network the first build's package download can stall.
; If it does, fetch espressif32's toolchain + framework out-of-band and point
; `platform_packages` at the local archives (see git history for the helper).
build_flags =
    ; --- TFT_eSPI configured entirely via build flags (no User_Setup.h edit) ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DUSE_HSPI_PORT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    bblanchon/ArduinoJson@^7
    https://github.com/tzapu/WiFiManager.git
    bitbank2/AnimatedGIF@^2.1.1

; Host environment for protocol/xfer unit tests (added in M4).
[env:native]
platform = native
test_framework = unity
build_flags = -DUNIT_TEST
