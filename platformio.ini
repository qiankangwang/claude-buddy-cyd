[platformio]
default_envs = cyd

; ESP32-2432S028R "Cheap Yellow Display" (this CYD2USB unit is ILI9341 --
; feeding it the ST7789 driver gives a pure-white screen).
; Official espressif32 6.x => Arduino core 2.x. Do NOT move to core 3.x / pioarduino.
[env:cyd]
platform = espressif32@^6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = COM5
monitor_port = COM5
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
; NOTE: on a slow/blocked network the first build's package download can stall.
; If it does, fetch espressif32's toolchain + framework out-of-band and point
; `platform_packages` at the local archives (see git history for the helper).
build_flags =
    ; --- TFT_eSPI configured entirely via build flags (no User_Setup.h edit) ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DUSE_HSPI_PORT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DCORE_DEBUG_LEVEL=0
    ; --- NimBLE trimmed to what a peripheral-only stats gadget needs ---
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; NOTE: -flto was evaluated (2026-07) and does NOT link on this toolchain:
    ; PlatformIO archives framework objects with plain `ar` (no LTO plugin), so
    ; the linker drops app_main ("plugin needed to handle lto object"). ESP-IDF
    ; doesn't support LTO; reclaim flash elsewhere if the OTA slot gets tight.
; Touch (XPT2046) is driven directly in src/hal/touch.cpp -- no touch library
; (the library's IRQ gating swallowed contacts and its pressure floor was
; hardcoded too high for light taps).
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7
    https://github.com/tzapu/WiFiManager.git
    bitbank2/AnimatedGIF@^2.1.1
    h2zero/NimBLE-Arduino@^1.4.3

; WiFi reflash (works after the first USB flash of the OTA partition layout):
;   pio run -e cyd-ota -t upload      # firmware over WiFi
;   pio run -e cyd-ota -t uploadfs    # GIF pack over WiFi
; Set --auth to YOUR device token (the one in ~/.claude/buddy.json); keep the
; placeholder out of commits -- this is a public repo.
[env:cyd-ota]
extends = env:cyd
upload_protocol = espota
upload_port = claude-cyd.local
upload_flags = --auth=YOUR_DEVICE_TOKEN
